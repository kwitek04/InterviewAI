name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build, Test & Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # mvn verify runs unit tests (Surefire) AND integration tests (Failsafe,
      # *IT classes backed by Testcontainers — the runner's built-in Docker
      # daemon is used automatically, no docker-compose setup required), then
      # jacoco-maven-plugin (bound to the verify phase in pom.xml) produces the
      # combined coverage report from both test suites.
      - name: Build, test and generate coverage report
        run: mvn --batch-mode clean verify

      - name: Upload JaCoCo coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 14

  security-scan:
    name: Trivy Dependency Scan
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      # Pinned to a commit SHA rather than a version tag.
      # This commit is the verified-safe v0.35.0 release. Only bump this pin
      # via a reviewed PR against a commit that is independently confirmed
      # safe — never move it back to a mutable tag like @v0.35.0 or @latest.
      - name: Run Trivy vulnerability scanner (dependencies)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          exit-code: '1'

      - name: Upload Trivy results to the Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'
