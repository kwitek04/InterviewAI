name: interviewai

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: interviewai-postgres
    environment:
      POSTGRES_DB: interviewai
      POSTGRES_USER: interviewai
      POSTGRES_PASSWORD: interviewai
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U interviewai -d interviewai"]
      interval: 5s
      timeout: 3s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    container_name: interviewai-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10

  localstack:
    image: localstack/localstack:latest
    container_name: interviewai-localstack
    environment:
      SERVICES: s3,sqs
      PERSISTENCE: 1
    ports:
      - "4566:4566"
    volumes:
      - localstack-data:/var/lib/localstack
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
  ollama-models:
  localstack-data:
