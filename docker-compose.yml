name: interviewai

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: interviewai-postgres
    environment:
      POSTGRES_DB: interviewai
      POSTGRES_USER: interviewai
      POSTGRES_PASSWORD: interviewai
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U interviewai -d interviewai"]
      interval: 5s
      timeout: 3s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    container_name: interviewai-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10

  ollama-init:
    image: ollama/ollama:latest
    container_name: interviewai-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        echo "Waiting for Ollama at $$OLLAMA_HOST..."
        until ollama list >/dev/null 2>&1; do
          sleep 2
        done
        ollama pull llama3.2:3b
        ollama pull nomic-embed-text
        echo "Ollama models ready."
    restart: "no"

  localstack:
    # Pinned to the last free Community-edition release. Do not move to :latest.
    image: localstack/localstack:4
    container_name: interviewai-localstack
    environment:
      SERVICES: s3,sqs
      PERSISTENCE: 1
    ports:
      - "4566:4566"
    volumes:
      - localstack-data:/var/lib/localstack
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
  ollama-models:
  localstack-data:
