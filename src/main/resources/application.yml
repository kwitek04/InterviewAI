spring:
  application:
    name: interviewai
  datasource:
    url: jdbc:postgresql://localhost:5432/interviewai
    username: interviewai
    password: interviewai
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  threads:
    virtual:
      enabled: true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB

interviewai:
  llm:
    ollama:
      base-url: http://localhost:11434
      model-name: llama3.2:3b
      embedding-model-name: nomic-embed-text
      timeout: 60s
  storage:
    s3:
      endpoint: http://localhost:4566
      region: eu-central-1
      bucket: interviewai-cv
      access-key: test
      secret-key: test
      path-style-access: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
